name: Monthly SEO Refresh

# Runs on the 1st of every month at 3:00 AM UTC
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  seo-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger SEO Refresh
        run: |
          echo "Triggering monthly SEO refresh..."
          
          # Call the Cloud Run endpoint
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.CLOUD_RUN_URL }}/api/seo/refresh-all" \
            -H "Content-Type: application/json" \
            -d '{}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ SEO refresh failed with status $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ SEO refresh completed successfully"
